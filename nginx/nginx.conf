user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

# ── Layer-4 TLS routing (SNI-based) ───────────────────────────────────────────
#
# Purpose: User-created websites in CyberPanel are served by OpenLiteSpeed
# inside the cyberpanel_alma container.  nginx cannot terminate SSL for those
# domains because the certificates are managed by CyberPanel, not by nginx.
#
# Solution: Inspect the TLS ClientHello SNI field BEFORE decryption.
#   • Known HCOS infrastructure domains → forward to nginx's own HTTP module
#     on an internal port (8443) where nginx terminates SSL normally.
#   • All other domains → TCP-passthrough to OpenLiteSpeed on port 443 so
#     CyberPanel/OLS handles SSL termination with its own LE certificates.
#
# This is transparent to clients and persists across container restarts
# because it is purely configuration-based (no runtime state).
# ──────────────────────────────────────────────────────────────────────────────

stream {
    # Route TLS connections by SNI hostname
    map $ssl_preread_server_name $tls_upstream {
        # ── HCOS infrastructure domains (handled by nginx HTTP blocks) ────
        platform.hcos.io        nginx_https;
        key.hcos.io             nginx_https;
        key.gohcos.com          nginx_https;
        api.hcos.io             nginx_https;
        request.hcos.io         nginx_https;
        request.gohcos.com      nginx_https;
        onedash.hcos.io         nginx_https;
        onedash.gohcos.com      nginx_https;
        onedash.hcomos.com      nginx_https;
        hcos.io                 nginx_https;
        gohcos.com              nginx_https;
        chat.hcos.io            nginx_https;

        # ── Everything else → CyberPanel / OpenLiteSpeed ─────────────────
        # User-created domains (including *.hcos.io subdomains provisioned
        # in CyberPanel) fall through to the default and are TCP-passed
        # to OpenLiteSpeed, which holds the vhost configs and LE certs.
        default                 cyberpanel_https;
    }

    upstream nginx_https {
        server 127.0.0.1:8443;
    }

    upstream cyberpanel_https {
        server cyberpanel_host:443;
    }

    server {
        listen 443;
        listen [::]:443;

        ssl_preread  on;
        proxy_pass   $tls_upstream;

        # Long timeout for WebSocket and large transfers
        proxy_connect_timeout  10s;
        proxy_timeout          86400s;
    }
}

# ── Layer-7 HTTP module ───────────────────────────────────────────────────────
#
# HTTPS server blocks now listen on port 8443 (internal only — stream routes
# traffic here based on SNI).  HTTP (port 80) still listens directly.
# ──────────────────────────────────────────────────────────────────────────────

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    include /etc/nginx/conf.d/*.conf;
}
